services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: minimax-chess-api:latest
    ports:
      - "5000:5000"
    expose:
      - 5000
    environment:
      PORT: "5000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: minimax-chess-web:latest
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://api:5000
    depends_on:
      - api

  chess-bot:
    build:
      context: .
      dockerfile: Dockerfile.cli
    image: minimax-chess-bot-cli:latest
    stdin_open: true
    tty: true

  tests:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile.cli
    image: minimax-chess-bot-cli:latest
    command: ["make", "test"]
