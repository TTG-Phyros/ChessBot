services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    image: minimax-chess-bot-service:latest
    command: ["./chess-bot-service"]
    environment:
      BOT_DEPTH: "${BOT_DEPTH:-4}"
    expose:
      - 5001

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: minimax-chess-api:latest
    ports:
      - "5000:5000"
    expose:
      - 5000
    environment:
      PORT: "5000"
      BOT_URL: http://bot:5001
      BOT_TIMEOUT_SECONDS: "60"
    depends_on:
      - bot

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: minimax-chess-web:latest
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://api:5000
    depends_on:
      - api

  chess-bot:
    build:
      context: .
      dockerfile: Dockerfile.cli
    image: minimax-chess-bot-cli:latest
    environment:
      BOT_DEPTH: "${BOT_DEPTH:-4}"
    stdin_open: true
    tty: true

  tests:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile.cli
    image: minimax-chess-bot-cli:latest
    command: ["make", "test"]
